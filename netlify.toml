[build]
  command = "bash build.sh"
  publish = "."

# Prevent Netlify from caching sw.js and index.html —
# the browser must always fetch the latest version of these two files.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

# All other assets (manifest, icons) can be cached normally
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
